services:
  postgres:
    image: postgres:16-alpine
    container_name: oneroof-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: oneroof
      POSTGRES_USER: oneroof
      POSTGRES_PASSWORD: oneroof
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oneroof -d oneroof"]
      interval: 1s
      timeout: 5s
      retries: 30

volumes:
  pgdata:
